<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0e;
    --bg2:       #111116;
    --bg3:       #18181f;
    --surface:   #1e1e28;
    --green:     #1DB954;
    --green-dim: rgba(29,185,84,0.15);
    --text:      #e8e8f0;
    --muted:     rgba(255,255,255,0.4);
    --border:    rgba(255,255,255,0.07);
    --radius:    12px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .mp-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,14,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .mp-back {
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    transition: color 0.2s;
    font-weight: 400;
  }
  .mp-back:hover { color: var(--text); }
  .mp-back svg { flex-shrink: 0; }
  .mp-header-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .mp-header-badge {
    margin-left: auto;
    background: var(--green-dim);
    color: var(--green);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid rgba(29,185,84,0.25);
  }

  /* ── HERO ── */
  .mp-hero {
    padding: 48px 32px 32px;
    display: flex;
    gap: 40px;
    align-items: flex-end;
    background: linear-gradient(180deg, #1a1a28 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .mp-hero-art {
    width: 200px;
    height: 200px;
    border-radius: 16px;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .mp-hero-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .mp-hero-art-placeholder {
    font-size: 64px;
    opacity: 0.3;
  }
  .mp-hero-info { flex: 1; }
  .mp-hero-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .mp-hero-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 20px;
  }
  .mp-hero-meta {
    color: var(--muted);
    font-size: 13px;
    font-weight: 300;
  }
  .mp-hero-meta strong { color: var(--text); font-weight: 500; }
  .mp-hero-actions {
    display: flex;
    gap: 14px;
    margin-top: 24px;
    align-items: center;
  }
  .mp-play-all {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--green);
    color: #000;
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  .mp-play-all:hover { background: #1ed760; transform: scale(1.03); }
  .mp-shuffle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 11px 22px;
    border-radius: 30px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  .mp-shuffle:hover { background: var(--bg3); transform: scale(1.03); }

  /* ── TRACK LIST ── */
  .mp-content {
    padding: 24px 32px 100px;
  }
  .mp-section-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 12px;
    display: grid;
    grid-template-columns: 40px 3fr 2fr 1fr;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .mp-section-title .col-right { text-align: right; }

  #mdp-playlist-container {}

  .mdp-track-item {
    display: grid;
    grid-template-columns: 40px 3fr 2fr 1fr;
    gap: 16px;
    align-items: center;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .mdp-track-item:hover { background: rgba(255,255,255,0.05); }
  .mdp-track-item.mdp-active {
    background: rgba(29,185,84,0.1) !important;
    border-left-color: var(--green) !important;
  }
  .mdp-track-item.mdp-active .mdp-track-num { color: var(--green) !important; }

  .mdp-track-num {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .mdp-track-main {
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }
  .mdp-track-cover {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
  }
  .mdp-track-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .mdp-track-text { overflow: hidden; }
  .mdp-track-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.15s;
  }
  .mdp-track-item:hover .mdp-track-name,
  .mdp-track-item.mdp-active .mdp-track-name { color: #fff; }
  .mdp-track-artist {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
    font-weight: 300;
  }
  .mdp-track-album {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
  }
  .mdp-track-dur {
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-weight: 300;
  }

  /* ── EMPTY STATE ── */
  .mp-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .mp-empty-icon { font-size: 56px; opacity: 0.4; margin-bottom: 16px; }
  .mp-empty h3 { font-family: 'Syne', sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .mp-empty p { font-size: 13px; line-height: 1.6; max-width: 360px; margin: 0 auto; }
  .mp-empty code { background: var(--surface); padding: 2px 6px; border-radius: 4px; font-size: 12px; color: var(--green); }

  /* ── LOADING ── */
  .mp-loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .mp-loading-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin: 0 3px;
    animation: mp-bounce 1.2s ease-in-out infinite;
  }
  .mp-loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .mp-loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes mp-bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .mp-hero { flex-direction: column; align-items: flex-start; gap: 24px; padding: 32px 20px 24px; }
    .mp-hero-art { width: 140px; height: 140px; }
    .mp-hero-name { font-size: 28px; }
    .mp-content { padding: 16px 16px 100px; }
    .mp-section-title { grid-template-columns: 32px 1fr; }
    .mp-section-title .col-album,
    .mp-section-title .col-right { display: none; }
    .mdp-track-item { grid-template-columns: 32px 1fr; }
    .mdp-track-album, .mdp-track-dur { display: none; }
    .mp-header { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="mp-header">
  <a href="index.html" class="mp-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    Dashboard
  </a>
  <span class="mp-header-title">🎵 Playlist</span>
  <span class="mp-header-badge" id="mp-count-badge">Memuat...</span>
</header>

<!-- HERO -->
<section class="mp-hero">
  <div class="mp-hero-art" id="mp-hero-art">
    <div class="mp-hero-art-placeholder">🎵</div>
  </div>
  <div class="mp-hero-info">
    <div class="mp-hero-label">Playlist Publik</div>
    <h1 class="mp-hero-name">Dashboard<br>Data Madha</h1>
    <p class="mp-hero-meta">
      <strong id="mp-total">0</strong> lagu &nbsp;·&nbsp; PT KB Finansia Multi Finance
    </p>
    <div class="mp-hero-actions">
      <button class="mp-play-all" id="mp-play-all-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Putar Semua
      </button>
      <button class="mp-shuffle" id="mp-shuffle-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
        Acak
      </button>
    </div>
  </div>
</section>

<!-- TRACK LIST -->
<main class="mp-content">
  <div class="mp-section-title">
    <span>#</span>
    <span>JUDUL</span>
    <span class="col-album">ALBUM</span>
    <span class="col-right">DURASI</span>
  </div>
  <div id="mdp-playlist-container">
    <div class="mp-loading">
      <span class="mp-loading-dot"></span>
      <span class="mp-loading-dot"></span>
      <span class="mp-loading-dot"></span>
    </div>
  </div>
</main>

<!-- GLOBAL PLAYER -->
<script src="assets/js/music-player.js"></script>

<script>
  // Build track list when player is ready
  window.addEventListener('mdp:ready', function(e) {
    const playlist = e.detail.playlist;
    const container = document.getElementById('mdp-playlist-container');
    const badge = document.getElementById('mp-count-badge');
    const total = document.getElementById('mp-total');

    badge.textContent = playlist.length + ' Lagu';
    total.textContent = playlist.length;

    // Update hero art with first track cover
    if (playlist[0] && playlist[0].cover) {
      const heroArt = document.getElementById('mp-hero-art');
      heroArt.innerHTML = `<img src="${playlist[0].cover}" alt="Cover" onerror="this.parentNode.innerHTML='<div class=mp-hero-art-placeholder>🎵</div>'" />`;
    }

    if (!playlist.length) {
      container.innerHTML = `
        <div class="mp-empty">
          <div class="mp-empty-icon">🎵</div>
          <h3>Playlist Kosong</h3>
          <p>Tambahkan lagu ke <code>assets/music/</code> dan perbarui <code>playlist.json</code>.</p>
        </div>`;
      return;
    }

    container.innerHTML = '';
    playlist.forEach(function(track, i) {
      const item = document.createElement('div');
      item.className = 'mdp-track-item';
      item.dataset.index = i;

      const dur = track.duration || '';
      const artist = track.artist || 'Dashboard Data Madha';
      const album = track.album || '';
      const cover = track.cover || '';

      item.innerHTML = `
        <div class="mdp-track-num">${i + 1}</div>
        <div class="mdp-track-main">
          <div class="mdp-track-cover">
            <img src="${cover}" alt="" onerror="this.style.display='none'" />
          </div>
          <div class="mdp-track-text">
            <div class="mdp-track-name">${track.title}</div>
            <div class="mdp-track-artist">${artist}</div>
          </div>
        </div>
        <div class="mdp-track-album">${album}</div>
        <div class="mdp-track-dur">${dur}</div>
      `;

      item.addEventListener('click', function() {
        window.MDP.playAt(i);
      });

      container.appendChild(item);
    });

    // Highlight active on load
    const activeIndex = window.MDP.getIndex();
    const items = container.querySelectorAll('.mdp-track-item');
    if (items[activeIndex]) items[activeIndex].classList.add('mdp-active');
  });

  // Play all
  document.getElementById('mp-play-all-btn').addEventListener('click', function() {
    window.MDP && window.MDP.playAt(0);
  });

  // Shuffle
  document.getElementById('mp-shuffle-btn').addEventListener('click', function() {
    if (!window.MDP) return;
    const playlist = window.MDP.getPlaylist();
    if (!playlist.length) return;
    const randomIdx = Math.floor(Math.random() * playlist.length);
    window.MDP.playAt(randomIdx);
  });
</script>
</body>
</html>
