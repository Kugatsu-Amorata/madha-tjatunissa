<style>
/* ═══ RESET & ROOT ═══════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #080810;
  --bg3:       #14141e;
  --surface:   #1c1c28;
  --green:     #1DB954;
  --green-glow:rgba(29,185,84,0.22);
  --green-dim: rgba(29,185,84,0.12);
  --text:      #eaeaf4;
  --muted:     rgba(255,255,255,0.38);
  --muted2:    rgba(255,255,255,0.14);
  --border:    rgba(255,255,255,0.07);
  --red:       #ff4d6d;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 110px;
}

/* ═══ AMBIENT BG ORBS ════════════════════════════════ */
.orb {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 0; filter: blur(60px);
}
#orb1 {
  width: 700px; height: 700px; top: -250px; left: -200px;
  background: radial-gradient(circle, rgba(29,185,84,0.07) 0%, transparent 70%);
  transition: background 2s ease;
}
#orb2 {
  width: 500px; height: 500px; bottom: -200px; right: -150px;
  background: radial-gradient(circle, rgba(80,60,220,0.05) 0%, transparent 70%);
}

/* ═══ HEADER ══════════════════════════════════════════ */
.mp-header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; gap: 16px;
}
.mp-back {
  display: flex; align-items: center; gap: 8px;
  text-decoration: none; color: var(--muted); font-size: 13px;
  padding: 6px 10px; border-radius: 8px; transition: all 0.2s;
}
.mp-back:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.mp-header-title {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text);
}
.mp-header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.mp-header-badge {
  background: var(--green-dim); color: var(--green);
  font-size: 11px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; border: 1px solid rgba(29,185,84,0.2);
  letter-spacing: 0.04em;
}
/* Search */
.mp-search-wrap { position: relative; display: flex; align-items: center; }
.mp-search-wrap svg { position: absolute; left: 10px; color: var(--muted); pointer-events: none; }
#mp-search {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px;
  padding: 7px 12px 7px 34px; border-radius: 20px; outline: none;
  width: 200px; transition: border-color 0.2s, width 0.3s;
}
#mp-search:focus { border-color: rgba(29,185,84,0.4); width: 240px; }
#mp-search::placeholder { color: var(--muted); }

/* ═══ HERO ════════════════════════════════════════════ */
.mp-hero {
  position: relative; z-index: 1;
  padding: 52px 36px 36px;
  display: flex; gap: 40px; align-items: flex-end;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  transition: background 1.8s ease;
  background: linear-gradient(170deg, #1a1a2c 0%, transparent 80%);
}
.mp-hero-art {
  width: 200px; height: 200px; border-radius: 18px; flex-shrink: 0;
  overflow: hidden;
  box-shadow: 0 28px 80px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.06);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  transition: box-shadow 0.6s;
}
.mp-hero-art img { width: 100%; height: 100%; object-fit: cover; }
.mp-hero-art-placeholder { font-size: 60px; opacity: 0.18; }

.mp-hero-info { flex: 1; position: relative; z-index: 1; }
.mp-hero-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.15em;
  color: var(--green); text-transform: uppercase; margin-bottom: 10px;
}
.mp-hero-name {
  font-family: 'Syne', sans-serif;
  font-size: clamp(26px, 5vw, 54px); font-weight: 800;
  line-height: 1.0; letter-spacing: -0.03em; color: #fff;
  margin-bottom: 14px;
}
.mp-hero-stats {
  display: flex; gap: 6px; align-items: center;
  color: var(--muted); font-size: 12px; margin-bottom: 12px; flex-wrap: wrap;
}
.mp-hero-stats strong { color: var(--text); font-weight: 600; }
.mp-hero-stats .dot { opacity: 0.3; }

/* Genre chips */
.mp-genre-bar { display: flex; gap: 7px; flex-wrap: wrap; margin: 0 0 20px; }
.mp-genre-chip {
  padding: 4px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  transition: all 0.18s; user-select: none;
}
.mp-genre-chip:hover { border-color: rgba(29,185,84,0.35); color: var(--text); }
.mp-genre-chip.active {
  background: var(--green); color: #000; border-color: var(--green);
  box-shadow: 0 2px 14px var(--green-glow);
}

.mp-hero-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.mp-play-all {
  display: flex; align-items: center; gap: 8px;
  background: var(--green); color: #000; border: none; padding: 12px 26px;
  border-radius: 30px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px var(--green-glow);
}
.mp-play-all:hover { background: #1ed760; transform: scale(1.04); }
.mp-btn-outline {
  display: flex; align-items: center; gap: 7px;
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 10px 18px; border-radius: 30px;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.18s;
}
.mp-btn-outline:hover { color: var(--text); border-color: rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); }
.mp-btn-outline.active { color: var(--red); border-color: rgba(255,77,109,0.35); }

/* ═══ RECENTLY PLAYED ════════════════════════════════ */
#mp-recent-section {
  padding: 24px 36px 0; position: relative; z-index: 1;
}
.mp-section-heading {
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
}
.mp-recent-list { display: flex; gap: 9px; flex-wrap: wrap; }
.mp-recent-chip {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 7px 14px 7px 7px;
  cursor: pointer; transition: all 0.18s; max-width: 210px;
}
.mp-recent-chip:hover { background: var(--bg3); border-color: rgba(255,255,255,0.12); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.mp-recent-chip-art {
  width: 34px; height: 34px; border-radius: 6px; flex-shrink: 0;
  background: var(--bg3); display: flex; align-items: center; justify-content: center;
  font-size: 15px; overflow: hidden;
}
.mp-recent-chip-art img { width: 100%; height: 100%; object-fit: cover; }
.mp-recent-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
.mp-recent-artist { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }

/* ═══ TRACK LIST ══════════════════════════════════════ */
.mp-content { padding: 20px 36px 120px; position: relative; z-index: 1; }
.mp-section-title {
  font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  padding: 0 14px 10px;
  display: grid;
  grid-template-columns: 44px 1fr 90px 56px 40px;
  gap: 10px;
  border-bottom: 1px solid var(--border); margin-bottom: 4px;
}
.mp-section-title .col-r { text-align: right; }

/* ── TRACK ITEM ── */
.mdp-track-item {
  display: grid;
  grid-template-columns: 44px 1fr 90px 56px 40px;
  gap: 10px; align-items: center;
  padding: 6px 14px; border-radius: 10px;
  cursor: pointer; position: relative;
  border-left: 3px solid transparent;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  user-select: none;
}
.mdp-track-item:hover { background: rgba(255,255,255,0.046); transform: translateX(2px); }
.mdp-track-item.mdp-active { background: rgba(29,185,84,0.085)!important; border-left-color: var(--green)!important; }
.mdp-track-item.sortable-ghost { opacity: 0.3; background: rgba(29,185,84,0.06)!important; border: 1px dashed rgba(29,185,84,0.3); }
.mdp-track-item.sortable-drag { background: var(--surface)!important; box-shadow: 0 16px 48px rgba(0,0,0,0.6); border-radius: 10px; }

/* Number col */
.mdp-track-num {
  width: 28px; color: var(--muted); font-size: 13px; text-align: center;
  font-variant-numeric: tabular-nums; position: relative;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
/* Play icon on hover */
.mdp-track-num .ico-play {
  display: none; position: absolute; inset: 0;
  align-items: center; justify-content: center; color: #fff;
}
.mdp-track-item:hover:not(.mdp-active) .mdp-track-num .ico-play { display: flex; }
.mdp-track-item:hover:not(.mdp-active) .mdp-track-num .num-txt { visibility: hidden; }
/* EQ bars for active */
.eq-bars {
  display: none; align-items: flex-end; justify-content: center;
  gap: 2px; height: 16px; position: absolute;
}
.eq-bars b {
  display: block; width: 3px; border-radius: 2px; background: var(--green);
  animation: eq 0.75s ease-in-out infinite alternate;
}
.eq-bars b:nth-child(1){ height:7px; animation-delay:0s; }
.eq-bars b:nth-child(2){ height:14px; animation-delay:0.15s; }
.eq-bars b:nth-child(3){ height:5px; animation-delay:0.3s; }
@keyframes eq { from{transform:scaleY(.35);opacity:.6} to{transform:scaleY(1);opacity:1} }
.mdp-track-item.mdp-active .eq-bars { display: flex; }
.mdp-track-item.mdp-active .num-txt { visibility: hidden; }

/* Track main */
.mdp-track-main { display: flex; align-items: center; gap: 12px; overflow: hidden; }
.mdp-track-cover {
  width: 42px; height: 42px; border-radius: 7px; flex-shrink: 0;
  background: var(--surface); overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  transition: box-shadow 0.2s;
}
.mdp-track-cover img { width:100%; height:100%; object-fit:cover; display:block; }
.mdp-track-item.mdp-active .mdp-track-cover { box-shadow: 0 0 0 2px var(--green); }
.mdp-track-text { overflow: hidden; }
.mdp-track-name {
  font-size: 13.5px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s;
}
.mdp-track-item:hover .mdp-track-name,
.mdp-track-item.mdp-active .mdp-track-name { color: #fff; }
.mdp-track-artist { font-size: 11.5px; color: var(--muted); font-weight: 300;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

/* Genre badge */
.mdp-track-genre {
  font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px; background: var(--surface);
  border: 1px solid var(--border); color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Duration */
.mdp-track-dur { font-size: 12px; color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; font-weight: 300; }

/* Like btn */
.mdp-like-btn {
  width: 32px; height: 32px; background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; color: var(--muted2); flex-shrink: 0;
  transition: color 0.2s, transform 0.15s, background 0.2s;
  opacity: 0;
}
.mdp-track-item:hover .mdp-like-btn,
.mdp-like-btn.liked { opacity: 1; }
.mdp-like-btn.liked { color: var(--red); }
.mdp-like-btn:hover { transform: scale(1.25); color: var(--red); background: rgba(255,77,109,0.1); }
.mdp-like-btn svg { pointer-events: none; }

/* ═══ LOADING / EMPTY ═════════════════════════════════ */
.mp-loading { text-align:center; padding:60px; color:var(--muted); }
.mp-loading-dot {
  display:inline-block; width:7px; height:7px; border-radius:50%;
  background:var(--green); margin:0 3px;
  animation:mpb 1.2s ease-in-out infinite;
}
.mp-loading-dot:nth-child(2){animation-delay:.2s}
.mp-loading-dot:nth-child(3){animation-delay:.4s}
@keyframes mpb { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-8px);opacity:1} }
.mp-no-results { text-align:center; padding:60px 20px; color:var(--muted); font-size:14px; }
.mp-empty { text-align:center; padding:80px 20px; color:var(--muted); }
.mp-empty-icon { font-size:52px; opacity:.25; margin-bottom:16px; }
.mp-empty h3 { font-family:'Syne',sans-serif; font-size:17px; margin-bottom:8px; color:var(--text); }
.mp-empty p { font-size:13px; line-height:1.7; max-width:340px; margin:0 auto; }
.mp-empty code { background:var(--surface); padding:2px 6px; border-radius:4px; font-size:12px; color:var(--green); }

/* ═══ RESPONSIVE ══════════════════════════════════════ */
@media(max-width:700px){
  .mp-header { padding:0 16px; }
  #mp-search { width:150px; } #mp-search:focus { width:170px; }
  .mp-hero { flex-direction:column; align-items:flex-start; gap:20px; padding:28px 18px 24px; }
  .mp-hero-art { width:120px; height:120px; }
  .mp-hero-name { font-size:24px; }
  .mp-content { padding:16px 16px 120px; }
  .mp-section-title { grid-template-columns:36px 1fr 40px; }
  .mp-section-title .col-genre,.mp-section-title .col-dur { display:none; }
  .mdp-track-item { grid-template-columns:36px 1fr 40px; }
  .mdp-track-genre,.mdp-track-dur { display:none; }
  #mp-recent-section { padding:20px 16px 0; }
}
@media(max-width:480px){
  .mp-search-wrap { display:none; }
  .mp-btn-outline span { display:none; }
}
</style>
</head>

  <div class="mp-recent-list" id="mp-recent-list"></div>
</div>

<!-- ══ TRACK LIST ══════════════════════════════════════ -->
<main class="mp-content">
  <div class="mp-section-title">
    <span>#</span>
    <span>JUDUL</span>
    <span class="col-genre">GENRE</span>
    <span class="col-dur col-r">DURASI</span>
    <span></span>
  </div>
  <div id="mdp-playlist-container">
    <div class="mp-loading">
      <span class="mp-loading-dot"></span>
      <span class="mp-loading-dot"></span>
      <span class="mp-loading-dot"></span>
    </div>
  </div>
</main>

<script src="assets/js/music-player.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   MUSIC PAGE — Premium UI Logic
   Sections: State · Utils · Render · Events · Boot
═══════════════════════════════════════════════════════ */
(function() {
  'use strict';

  /* ── STATE ─────────────────────────────────────────── */
  const LS_LIKED   = 'mdp_liked';
  const LS_RECENT  = 'mdp_recent';
  const MAX_RECENT = 6;

  let masterList   = [];          // full original playlist
  let filteredList = [];          // current view after filters
  let likedSet     = new Set(JSON.parse(localStorage.getItem(LS_LIKED)  || '[]'));
  let recentList   = JSON.parse(localStorage.getItem(LS_RECENT) || '[]');
  let activeGenre  = 'all';
  let searchQ      = '';
  let favsOnly     = false;
  let lastIdx      = -1;

  /* ── PERSIST ───────────────────────────────────────── */
  function saveLikes()  { localStorage.setItem(LS_LIKED,  JSON.stringify([...likedSet])); }
  function saveRecent() { localStorage.setItem(LS_RECENT, JSON.stringify(recentList)); }

  /* ── RECENTLY PLAYED ────────────────────────────────── */
  function pushRecent(origIdx) {
    const t = masterList[origIdx];
    if (!t) return;
    recentList = recentList.filter(function(r){ return r.idx !== origIdx; });
    recentList.unshift({ idx: origIdx, title: t.title, artist: t.artist||'', cover: t.cover||'' });
    if (recentList.length > MAX_RECENT) recentList.pop();
    saveRecent();
    renderRecent();
  }

  function renderRecent() {
    const sec  = document.getElementById('mp-recent-section');
    const list = document.getElementById('mp-recent-list');
    if (!recentList.length) { sec.style.display = 'none'; return; }
    sec.style.display = 'block';
    list.innerHTML = '';
    recentList.forEach(function(r) {
      const chip = document.createElement('div');
      chip.className = 'mp-recent-chip';
      chip.innerHTML =
        '<div class="mp-recent-chip-art">' +
          (r.cover ? '<img src="'+r.cover+'" alt="" onerror="this.style.display=\'none\'" />' : '🎵') +
        '</div>' +
        '<div>' +
          '<div class="mp-recent-title">'+r.title+'</div>' +
          '<div class="mp-recent-artist">'+(r.artist||'—')+'</div>' +
        '</div>';
      chip.addEventListener('click', function() {
        window.MDP && window.MDP.playAt(r.idx);
        pushRecent(r.idx);
      });
      list.appendChild(chip);
    });
  }

  /* ── GENRE CHIPS ────────────────────────────────────── */
  function buildGenres() {
    const bar    = document.getElementById('mp-genre-bar');
    const genres = ['all'];
    masterList.forEach(function(t) {
      if (t.genre && !genres.includes(t.genre)) genres.push(t.genre);
    });
    if (genres.length <= 2) { bar.style.display='none'; return; }
    bar.innerHTML = '';
    genres.forEach(function(g) {
      const c = document.createElement('button');
      c.className = 'mp-genre-chip' + (g==='all'?' active':'');
      c.textContent = g === 'all' ? 'Semua' : g;
      c.dataset.genre = g;
      c.addEventListener('click', function() {
        activeGenre = g;
        document.querySelectorAll('.mp-genre-chip').forEach(function(x){
          x.classList.toggle('active', x.dataset.genre === g);
        });
        applyFilters();
      });
      bar.appendChild(c);
    });
  }

  /* ── FILTER & RENDER ────────────────────────────────── */
  function applyFilters() {
    filteredList = masterList.filter(function(t, i) {
      const gOk = activeGenre==='all' || (t.genre||'').toLowerCase() === activeGenre.toLowerCase();
      const sOk = !searchQ ||
        (t.title||'').toLowerCase().includes(searchQ) ||
        (t.artist||'').toLowerCase().includes(searchQ);
      const fOk = !favsOnly || likedSet.has(i);
      return gOk && sOk && fOk;
    });
    renderTrackList();
  }

  /* ── STATS ──────────────────────────────────────────── */
  function updateStats() {
    document.getElementById('mp-total').textContent    = masterList.length;
    document.getElementById('mp-favcount').textContent = likedSet.size;
    document.getElementById('mp-count-badge').textContent = masterList.length + ' Lagu';
  }

  /* ── DYNAMIC BG ─────────────────────────────────────── */
  function updateDynBg(coverUrl) {
    const hero = document.getElementById('mp-hero');
    const orb  = document.getElementById('orb1');
    if (!coverUrl) {
      hero.style.background = '';
      orb.style.background  = 'radial-gradient(circle, rgba(29,185,84,0.07) 0%, transparent 70%)';
      return;
    }
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      try {
        var c = document.createElement('canvas');
        c.width=4; c.height=4;
        var ctx = c.getContext('2d');
        ctx.drawImage(img,0,0,4,4);
        var d = ctx.getImageData(0,0,4,4).data;
        var r=d[0], g=d[1], b=d[2];
        var bg = 'rgba('+r+','+g+','+b+',0.28)';
        hero.style.background = 'linear-gradient(170deg, '+bg+' 0%, transparent 75%)';
        orb.style.background  = 'radial-gradient(circle, rgba('+r+','+g+','+b+',0.12) 0%, transparent 70%)';
      } catch(e) { hero.style.background=''; }
    };
    img.onerror = function(){ hero.style.background=''; };
    img.src = coverUrl;
  }

  /* ── HERO ART ────────────────────────────────────────── */
  function setHeroArt(track) {
    var heroArt = document.getElementById('mp-hero-art');
    if (track && track.cover) {
      heroArt.innerHTML = '<img src="'+track.cover+'" alt="Cover" onerror="this.parentNode.innerHTML=\'<div class=mp-hero-art-placeholder>🎵</div>\'" />';
      updateDynBg(track.cover);
    } else {
      heroArt.innerHTML = '<div class="mp-hero-art-placeholder">🎵</div>';
      updateDynBg(null);
    }
  }

  /* ── RENDER TRACKS ───────────────────────────────────── */
  function renderTrackList() {
    var container = document.getElementById('mdp-playlist-container');
    container.innerHTML = '';

    if (!filteredList.length) {
      container.innerHTML = '<div class="mp-no-results">😔 Tidak ada lagu yang cocok.</div>';
      return;
    }

    var activeIdx = window.MDP ? window.MDP.getIndex() : -1;

    filteredList.forEach(function(track, dispI) {
      var origIdx = masterList.indexOf(track);
      var item = document.createElement('div');
      item.className = 'mdp-track-item' + (origIdx===activeIdx?' mdp-active':'');
      item.dataset.origIdx = origIdx;

      var isLiked = likedSet.has(origIdx);
      var cover   = track.cover || '';
      var artist  = track.artist || 'Dashboard Data Madha';
      var genre   = track.genre  || '';
      var dur     = track.duration || '';

      var coverHTML = cover
        ? '<img src="'+cover+'" alt="" onerror="this.style.display=\'none\'" />'
        : '🎵';

      item.innerHTML =
        '<div class="mdp-track-num">'+
          '<span class="num-txt">'+(dispI+1)+'</span>'+
          '<span class="ico-play">'+
            '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'+
          '</span>'+
          '<span class="eq-bars"><b></b><b></b><b></b></span>'+
        '</div>'+
        '<div class="mdp-track-main">'+
          '<div class="mdp-track-cover">'+coverHTML+'</div>'+
          '<div class="mdp-track-text">'+
            '<div class="mdp-track-name">'+track.title+'</div>'+
            '<div class="mdp-track-artist">'+artist+'</div>'+
          '</div>'+
        '</div>'+
        '<div class="mdp-track-genre">'+genre+'</div>'+
        '<div class="mdp-track-dur">'+dur+'</div>'+
        '<button class="mdp-like-btn'+(isLiked?' liked':'')+'" data-idx="'+origIdx+'" title="'+(isLiked?'Hapus favorit':'Tambah favorit')+'">'+
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="'+(isLiked?'currentColor':'none')+'" stroke="'+(isLiked?'none':'currentColor')+'" stroke-width="2">'+
            '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>'+
          '</svg>'+
        '</button>';

      /* Click row → play */
      item.addEventListener('click', function(e) {
        if (e.target.closest('.mdp-like-btn')) return;
        window.MDP && window.MDP.playAt(origIdx);
        pushRecent(origIdx);
      });

      /* Like button */
      item.querySelector('.mdp-like-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        toggleLike(parseInt(this.dataset.idx, 10));
      });

      container.appendChild(item);
    });

    initSortable(container);
  }

  /* ── LIKE TOGGLE ─────────────────────────────────────── */
  function toggleLike(idx) {
    var wasLiked = likedSet.has(idx);
    wasLiked ? likedSet.delete(idx) : likedSet.add(idx);
    saveLikes();
    updateStats();

    var btn = document.querySelector('.mdp-like-btn[data-idx="'+idx+'"]');
    if (btn) {
      var nowLiked = likedSet.has(idx);
      btn.classList.toggle('liked', nowLiked);
      btn.title = nowLiked ? 'Hapus favorit' : 'Tambah favorit';
      btn.innerHTML =
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="'+(nowLiked?'currentColor':'none')+'" stroke="'+(nowLiked?'none':'currentColor')+'" stroke-width="2">'+
          '<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>'+
        '</svg>';
      btn.style.transform = 'scale(1.45)';
      setTimeout(function(){ btn.style.transform=''; }, 160);
    }
    if (favsOnly) applyFilters();
  }

  /* ── DRAG & DROP ────────────────────────────────────── */
  function initSortable(container) {
    if (typeof Sortable === 'undefined') return;
    Sortable.create(container, {
      animation: 160,
      ghostClass: 'sortable-ghost',
      dragClass: 'sortable-drag',
      onEnd: function() {
        /* Re-number displayed indices */
        container.querySelectorAll('.mdp-track-item').forEach(function(el, i) {
          var numEl = el.querySelector('.num-txt');
          if (numEl) numEl.textContent = i + 1;
        });
      }
    });
  }

  /* ── ACTIVE TRACK HIGHLIGHT ─────────────────────────── */
  function highlightActive(idx) {
    document.querySelectorAll('.mdp-track-item').forEach(function(el) {
      el.classList.toggle('mdp-active', parseInt(el.dataset.origIdx,10) === idx);
    });
  }

  /* ── SEARCH INPUT ────────────────────────────────────── */
  document.getElementById('mp-search').addEventListener('input', function() {
    searchQ = this.value.trim().toLowerCase();
    applyFilters();
  });

  /* ── BUTTON EVENTS ───────────────────────────────────── */
  document.getElementById('mp-play-all-btn').addEventListener('click', function() {
    if (!window.MDP || !filteredList.length) return;
    var idx = masterList.indexOf(filteredList[0]);
    window.MDP.playAt(idx);
    pushRecent(idx);
  });

  document.getElementById('mp-shuffle-btn').addEventListener('click', function() {
    if (!window.MDP) return;
    var pool = filteredList.length ? filteredList : masterList;
    var t    = pool[Math.floor(Math.random() * pool.length)];
    var idx  = masterList.indexOf(t);
    window.MDP.playAt(idx);
    pushRecent(idx);
  });

  document.getElementById('mp-fav-btn').addEventListener('click', function() {
    favsOnly = !favsOnly;
    this.classList.toggle('active', favsOnly);
    var svgEl = this.querySelector('svg');
    svgEl.setAttribute('fill', favsOnly ? 'currentColor' : 'none');
    this.querySelector('span').textContent = favsOnly ? 'Semua' : 'Favorit';
    applyFilters();
  });

  /* ── MDP:READY ───────────────────────────────────────── */
  window.addEventListener('mdp:ready', function(e) {
    masterList   = e.detail.playlist;
    filteredList = masterList.slice();

    updateStats();
    buildGenres();
    renderTrackList();
    renderRecent();

    /* Set hero art to currently active track */
    var aIdx = window.MDP ? window.MDP.getIndex() : 0;
    setHeroArt(masterList[aIdx]);
    lastIdx = aIdx;
  });

  /* ── POLL ACTIVE INDEX ───────────────────────────────── */
  setInterval(function() {
    if (!window.MDP || !masterList.length) return;
    var idx = window.MDP.getIndex();
    if (idx !== lastIdx) {
      lastIdx = idx;
      highlightActive(idx);
      setHeroArt(masterList[idx]);
    }
  }, 500);

})();
</script>
</body>
</html>
