<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Data Madha</title>

<style>

body{
font-family:Arial;
margin:40px;

background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
color:white;
text-shadow:2px 2px 5px black;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.total{
background:white;
}

.prime{
background:#1976D2;
color:white;
}

.priority{
background:#FFD700;
color:black;
}

input{
padding:10px;
width:300px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.95);
}

th{
background:#7b1fa2;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

</style>
    
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1>Dashboard Data Madha</h1>

<div class="dashboard">

<div class="card total">
<h2 id="total"></h2>
Total Data
</div>
  
<div class="card prime">
<h2 id="prime"></h2>
Prime
</div>
  
<div class="card priority">
<h2 id="priority"></h2>
Priority
</div>
  
</div>

<div style="position:absolute; top:30px; right:60px; width:320px; background:rgba(255,255,255,0.9); padding:20px; border-radius:10px;">
<canvas id="areaChart"></canvas>
</div>

<input type="text" id="search" placeholder="Cari Nama / Plat / Agreement">

<table id="table">
<thead>
<tr>
<th>Agreement</th>
<th>Nama</th>
<th>Area</th>
<th>Cabang</th>
<th>Klasifikasi</th>
<th>Plat</th>
<th>Phone</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6ADg9gSdfwiOpfYZq47pZCEQ3yphM7WdLyENW_9t_NyvDM62nQvWioni4y4hbgHXblZibz0GSm-je/pub?gid=1801845643&single=true&output=csv";

let dataGlobal = [];

fetch(url)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

let prime=0;
let priority=0;

rows.forEach(r=>{

let col=r.split(",");

let obj={
agreement:col[0],
nama:col[1],
area:col[2],
cabang:col[3],
klasifikasi:col[4],
plat:col[5],
phone:col[6]
}

dataGlobal.push(obj);

if(obj.klasifikasi==="PRIME") prime++;
if(obj.klasifikasi==="PRIORITY") priority++;

});

document.getElementById("total").innerText=dataGlobal.length;
document.getElementById("prime").innerText=prime;
document.getElementById("priority").innerText=priority;

/* HITUNG AREA */

let areaCount = {};

dataGlobal.forEach(d=>{

if(areaCount[d.area]){
areaCount[d.area]++
}else{
areaCount[d.area]=1
}

});
const labels = Object.keys(areaCount);
const values = Object.values(areaCount);

/* BUAT CHART */

new Chart(document.getElementById("areaChart"), {

type:"doughnut",

data:{
labels:labels,
datasets:[{
data:values
}]
},

options:{
plugins:{
legend:{
position:"bottom"
}
}
}

});
    });

function renderTable(data){

let html="";

data.forEach(d=>{

html+=`
<tr>
<td>${d.agreement}</td>
<td>${d.nama}</td>
<td>${d.area}</td>
<td>${d.cabang}</td>
<td>${d.klasifikasi}</td>
<td>${d.plat}</td>
<td>${d.phone}</td>
</tr>
`

})

document.querySelector("#table tbody").innerHTML=html;

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let filtered=dataGlobal.filter(d=>

d.nama.toLowerCase().includes(keyword) ||
d.plat.toLowerCase().includes(keyword) ||
d.agreement.toLowerCase().includes(keyword) ||
d.area.toLowerCase().includes(keyword) ||
d.cabang.toLowerCase().includes(keyword) ||
d.phone.toLowerCase().includes(keyword)

)
    
renderTable(filtered);

});

</script>

</body>
</html>
