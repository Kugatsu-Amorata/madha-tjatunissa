<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Data Madha</title>

<style>

body{
font-family:Arial;
margin:40px;

background-image:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
background-size:cover;
background-position:center;
background-attachment:fixed;
}

h1{
color:white;
text-shadow:2px 2px 5px black;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
padding:20px;
border-radius:10px;
width:200px;
text-align:center;
font-weight:bold;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.total{
background:white;
}

.prime{
background:#1976D2;
color:white;
}

.priority{
background:#FFD700;
color:black;
}

input{
padding:10px;
width:300px;
margin-bottom:20px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
background:rgba(255,255,255,0.95);
}

th{
background:#7b1fa2;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

.topSection{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:20px;
}

.chartBox{
width:340px;
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:10px;
}

.navbar{
display:flex;
gap:10px;
margin-bottom:20px;
}

.navbar button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.navbar button:hover{
background:#ddd;
}
    
</style>
    
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>
<div class="navbar">

<button onclick="showPage('kmob')">KMOB</button>
<button onclick="showPage('cabang')">Cabang</button>

</div>
    <div id="kmobPage">
<h1>Dashboard Data Madha</h1>

<div class="topSection">

<div class="dashboard">

<div class="card total">
<h2 id="total"></h2>
Total Data
</div>
  
<div class="card prime">
<h2 id="prime"></h2>
Prime
</div>
  
<div class="card priority">
<h2 id="priority"></h2>
Priority
</div>
  
</div>

<div class="chartBox">
<canvas id="areaChart"></canvas>
</div>

</div>
    
<input type="text" id="search" placeholder="Cari Nama / Plat / Agreement">

<table id="table">
<thead>
<tr>
<th>Agreement</th>
<th>Nama</th>
<th>Area</th>
<th>Cabang</th>
<th>Klasifikasi</th>
<th>Plat</th>
<th>Phone</th>
</tr>
</thead>

<tbody></tbody>
</table>
</div>
    <div id="cabangPage" style="display:none;">

<h1>Data Cabang</h1>
<input type="text" id="searchCabang" placeholder="Cari Cabang / Alamat / Telepon">
<table id="cabangTable">

<thead>
<tr>
<th>Cabang</th>
<th>Alamat</th>
<th>Telepon</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>
<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6ADg9gSdfwiOpfYZq47pZCEQ3yphM7WdLyENW_9t_NyvDM62nQvWioni4y4hbgHXblZibz0GSm-je/pub?gid=1801845643&single=true&output=csv";

let dataGlobal = [];

fetch(url)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

let prime=0;
let priority=0;

rows.forEach(r=>{

if(!r) return;

let col=r.split(",");

let obj={
agreement:col[0]?.trim(),
nama:col[1]?.trim(),
area:col[2]?.trim(),
cabang:col[3]?.trim(),
klasifikasi:col[4]?.trim(),
plat:col[5]?.trim(),
phone:col[6]?.trim()
}

dataGlobal.push(obj);

if(obj.klasifikasi==="PRIME") prime++;
if(obj.klasifikasi==="PRIORITY") priority++;

});

document.getElementById("total").innerText=dataGlobal.length;
document.getElementById("prime").innerText=prime;
document.getElementById("priority").innerText=priority;

/* HITUNG AREA */

let areaCount = {};

dataGlobal.forEach(d=>{

if(areaCount[d.area]){
areaCount[d.area]++
}else{
areaCount[d.area]=1
}

});
const labels = Object.keys(areaCount);
const values = Object.values(areaCount);

/* BUAT CHART */

new Chart(document.getElementById("areaChart"), {

type:"doughnut",

data:{
labels:labels,
datasets:[{
data:values
}]
},

options:{
plugins:{
legend:{
position:"bottom"
}
}
}

});
    });

function renderTable(data){

let html="";

data.forEach(d=>{

html+=`
<tr>
<td>${d.agreement}</td>
<td>${d.nama}</td>
<td>${d.area}</td>
<td>${d.cabang}</td>
<td>${d.klasifikasi}</td>
<td>${d.plat}</td>
<td>${d.phone}</td>
</tr>
`

})

document.querySelector("#table tbody").innerHTML =
html || `<tr><td colspan="7" style="text-align:center;">Tidak ada data</td></tr>`;

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase().trim();

/* kalau kosong jangan tampilkan data */

if(keyword === ""){
document.querySelector("#table tbody").innerHTML="";
return;
}

let filtered=dataGlobal.filter(d=>

d.nama.toLowerCase().includes(keyword) ||
d.plat.toLowerCase().includes(keyword) ||
d.agreement.toLowerCase().includes(keyword) ||
d.area.toLowerCase().includes(keyword) ||
d.cabang.toLowerCase().includes(keyword) ||
d.phone.toLowerCase().includes(keyword)

)

renderTable(filtered);

});
function showPage(page){

document.getElementById("kmobPage").style.display="none";
document.getElementById("cabangPage").style.display="none";

if(page==="kmob"){
document.getElementById("kmobPage").style.display="block";
}

if(page==="cabang"){
document.getElementById("cabangPage").style.display="block";
}

}
const cabangUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR8N4KMXSbLh24-Y3Ar-bsj0_oYNqwiDVD7kjIS_IiE4vvVjdOteuUEIg_Cbrl69tz0NVjeWh_NxLS1/pub?gid=974265388&single=true&output=csv";
let dataCabang = []; 
fetch(cabangUrl)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

rows.forEach(r=>{

if(!r) return;

let col = r.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

let obj={
cabang:col[1]?.replace(/"/g,'').trim(),
alamat:col[2]?.replace(/"/g,'').trim(),
telepon:col[3]?.replace(/"/g,'').trim()
}
dataCabang.push(obj);

});

});


function renderCabang(data){

let html="";

data.forEach(d=>{

html+=`
<tr>
<td>${d.cabang}</td>
<td>${d.alamat}</td>
<td>${d.telepon}</td>
</tr>
`

})

document.querySelector("#cabangTable tbody").innerHTML =
html || `<tr><td colspan="3" style="text-align:center;">Tidak ada data</td></tr>`;

}
    document.getElementById("searchCabang").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase().trim();

/* jika kosong jangan tampilkan */

if(keyword===""){
document.querySelector("#cabangTable tbody").innerHTML="";
return;
}

let filtered=dataCabang.filter(d=>

d.cabang.toLowerCase().includes(keyword) ||
d.alamat.toLowerCase().includes(keyword) ||
d.telepon.toLowerCase().includes(keyword)

)

renderCabang(filtered);

});
</script>

</body>
</html>
