<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Data Madun</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:40px;
}

h1{
color:#333;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
width:200px;
text-align:center;
}

.card h2{
margin:0;
color:#7b1fa2;
}

input{
padding:10px;
width:300px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#7b1fa2;
color:white;
padding:10px;
}

td{
padding:8px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f3e5f5;
}

</style>

</head>

<body>

<h1>Dashboard Data Madun</h1>

<div class="dashboard">

<div class="card">
<h2 id="total"></h2>
Total Data
</div>

<div class="card">
<h2 id="prime"></h2>
Prime
</div>

<div class="card">
<h2 id="priority"></h2>
Priority
</div>

</div>

<input type="text" id="search" placeholder="Cari Nama / Plat / Agreement">

<table id="table">
<thead>
<tr>
<th>Agreement</th>
<th>Nama</th>
<th>Area</th>
<th>Cabang</th>
<th>Klasifikasi</th>
<th>Plat</th>
<th>Phone</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT6ADg9gSdfwiOpfYZq47pZCEQ3yphM7WdLyENW_9t_NyvDM62nQvWioni4y4hbgHXblZibz0GSm-je/pub?gid=1801845643&single=true&output=csv";

let dataGlobal = [];

fetch(url)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1);

let prime=0;
let priority=0;

rows.forEach(r=>{

let col=r.split(",");

let obj={
agreement:col[0],
nama:col[1],
area:col[2],
cabang:col[3],
klasifikasi:col[4],
plat:col[5],
phone:col[6]
}

dataGlobal.push(obj);

if(obj.klasifikasi==="PRIME") prime++;
if(obj.klasifikasi==="PRIORITY") priority++;

});

document.getElementById("total").innerText=dataGlobal.length;
document.getElementById("prime").innerText=prime;
document.getElementById("priority").innerText=priority;

renderTable(dataGlobal);

});

function renderTable(data){

let html="";

data.forEach(d=>{

html+=`
<tr>
<td>${d.agreement}</td>
<td>${d.nama}</td>
<td>${d.area}</td>
<td>${d.cabang}</td>
<td>${d.klasifikasi}</td>
<td>${d.plat}</td>
<td>${d.phone}</td>
</tr>
`

})

document.querySelector("#table tbody").innerHTML=html;

}

document.getElementById("search").addEventListener("keyup",function(){

let keyword=this.value.toLowerCase();

let filtered=dataGlobal.filter(d=>

d.nama.toLowerCase().includes(keyword) ||
d.plat.toLowerCase().includes(keyword) ||
d.agreement.toLowerCase().includes(keyword)

)

renderTable(filtered);

});

</script>

</body>
</html>
